name: Validate Question Modules

on:
  push:
    paths:
      - 'questions/**'
      - 'scripts/**'
      - 'index.html'
      - 'quiz.js'
      - 'loader.js'
  pull_request:
    paths:
      - 'questions/**'
      - 'scripts/**'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Regenerate manifest
        run: node scripts/generate-manifest.js

      - name: Syntax check all question modules
        run: |
          echo "Checking syntax of questions/<SUBJECT>/*.js ..."
          find questions -mindepth 2 -maxdepth 2 -name '*.js' | sort | while read -r f; do
            echo "  → $f"
            node --check "$f" || exit 1
          done
          echo "All modules have valid JavaScript syntax."

      - name: Integrity checks
        run: node scripts/validate-questions.js

      - name: Summary
        run: echo "Question modules validated successfully."
