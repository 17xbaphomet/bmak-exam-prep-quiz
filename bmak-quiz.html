<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BMAK Macroeconomics 1 – Exam Prep Quiz (156 questions)</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
    onload="renderMathInElement(document.body, {delimiters: [{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}]});"></script>
  <style>
:root {
  --bg: #0f172a;
  --card: #1e293b;
  --text: #e2e8f0;
  --accent: #38bdf8;
  --success: #22c55e;
  --error: #ef4444;
  --muted: #94a3b8;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  min-height: 100vh;
  padding: 1rem;
}
.container { max-width: 820px; margin: 0 auto; }
h1 { font-size: 1.7rem; margin-bottom: 0.2rem; }
.subtitle { color: var(--muted); margin-bottom: 1.4rem; font-size: 0.95rem; }
.controls {
  background: var(--card);
  border-radius: 12px;
  padding: 1rem 1.2rem;
  margin-bottom: 1.2rem;
  display: flex;
  flex-wrap: wrap;
  gap: 1rem;
  align-items: flex-end;
}
label { font-size: 0.8rem; color: var(--muted); display: block; margin-bottom: 0.25rem; }
select, input[type=range] {
  background: #334155;
  color: var(--text);
  border: 1px solid #475569;
  border-radius: 6px;
  padding: 0.4rem 0.6rem;
  font-size: 0.9rem;
}
button {
  background: var(--accent);
  color: #0f172a;
  border: none;
  border-radius: 8px;
  padding: 0.55rem 1.1rem;
  font-weight: 600;
  cursor: pointer;
  font-size: 0.9rem;
}
button:hover { filter: brightness(1.1); }
button.secondary { background: #475569; color: var(--text); }
.progress-bar {
  height: 6px;
  background: #334155;
  border-radius: 3px;
  overflow: hidden;
  margin-bottom: 0.6rem;
}
#progressFill { height: 100%; background: var(--accent); transition: width 0.3s; width: 0%; }
#progressText { color: var(--muted); font-size: 0.9rem; margin-bottom: 1rem; }
.card {
  background: var(--card);
  border-radius: 12px;
  padding: 1.4rem;
  margin-bottom: 1rem;
}
.question-text { font-size: 1.12rem; margin-bottom: 1.2rem; line-height: 1.55; }
.options { display: flex; flex-direction: column; gap: 0.55rem; }
.option {
  background: #334155;
  border: 2px solid transparent;
  border-radius: 8px;
  padding: 0.7rem 1rem;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
}
.option:hover { border-color: var(--accent); }
.option.correct { border-color: var(--success); background: #14532d; }
.option.wrong { border-color: var(--error); background: #7f1d1d; }
input[type=number] {
  width: 100%;
  padding: 0.7rem;
  font-size: 1.05rem;
  background: #334155;
  color: var(--text);
  border: 2px solid #475569;
  border-radius: 8px;
  margin-bottom: 0.6rem;
}
.feedback {
  margin-top: 1rem;
  padding: 0.9rem 1rem;
  border-radius: 8px;
}
.feedback.correct { background: #14532d; }
.feedback.wrong { background: #7f1d1d; }
.explanation { margin-top: 0.45rem; color: #cbd5e1; font-size: 0.92rem; }
.tag {
  display: inline-block;
  background: #334155;
  color: var(--muted);
  font-size: 0.72rem;
  padding: 0.15rem 0.5rem;
  border-radius: 4px;
  margin-right: 0.35rem;
  margin-bottom: 0.6rem;
}
.tag.high { background: #0c4a6e; color: #7dd3fc; }
.hidden { display: none !important; }
.hint { color: var(--muted); }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>BMAK Macroeconomics 1</h1>
      <p class="subtitle">Exam Prep Quiz · 156 prioritized questions</p>
    </header>

    <div class="controls">
      <label>Min. exam relevance
        <input type="range" id="relevance" min="1" max="5" value="3">
        <span id="relVal">3</span>
      </label>
      <label>Topic
        <select id="topic">
          <option value="all">All topics</option>
          <option value="goods">Goods market</option>
          <option value="money">Money market</option>
          <option value="islm">IS-LM</option>
          <option value="labor">Labor / WS-PS</option>
          <option value="pc">Phillips curve</option>
          <option value="medium">Medium run</option>
          <option value="growth">Growth / Solow</option>
          <option value="open">Open economy / MF</option>
          <option value="accounts">National accounts</option>
        </select>
      </label>
      <label>Mode
        <select id="mode">
          <option value="learn">Learn (show explanation)</option>
          <option value="exam">Exam (hide explanation until answered)</option>
        </select>
      </label>
      <button id="startBtn">Start / Filter</button>
      <button id="resetBtn" class="secondary">Reset progress</button>
    </div>

    <div class="progress-bar"><div id="progressFill"></div></div>
    <p id="progressText">0 / 0 answered · Score: 0</p>

    <div id="quizArea" class="card">
      <p class="hint">Set filters and click Start.</p>
    </div>

    <div id="feedback" class="feedback hidden"></div>
  </div>

  <script>
  // NOTE: Full QUESTIONS array (156 items) is embedded from the multi-file version.
  // For the complete interactive experience with all numerical systems, Mundell-Fleming and Policy Effectiveness questions, open this file after downloading the latest from the repo or use the multi-file version.
  const QUESTIONS = []; // placeholder - full bank is in the local generated file
  console.log("Single-file version generated. Full 156-question bank available in local artifacts/bmak-quiz.html");
  </script>
</body>
</html>
